<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theme Song — misaki.books</title>
  <style>
    :root {
      --blue: #2A17FF;
      --white: #ffffff;
      --sidebar-width: 104px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
      background: var(--white);
      color: var(--blue);
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    .sidebar {
      position: fixed;
      top: 0; left: 0;
      z-index: 50;
      width: var(--sidebar-width);
      height: 100vh;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: var(--blue);
      color: var(--white);
    }

    .side-logo {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: 13px;
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.08em;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 18px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav a { opacity: 0.72; transition: opacity 0.2s; }
    .nav a:hover { opacity: 1; }
    .nav a.active { opacity: 1; }

    main {
      padding: 96px 8vw 120px calc(var(--sidebar-width) + 8vw);
      min-height: 100vh;
    }

    /* breadcrumb */
    .breadcrumb {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .breadcrumb a { opacity: 1; }
    .breadcrumb a:hover { opacity: 0.6; }
    .breadcrumb span { opacity: 0.5; }

    /* page header */
    .page-header {
      margin-bottom: 72px;
      padding-bottom: 32px;
      border-bottom: 1px solid rgba(42,23,255,0.15);
    }

    .page-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.4;
      margin: 0 0 14px;
    }

    .page-title {
      font-size: clamp(28px, 4vw, 54px);
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.02em;
      margin: 0;
      line-height: 1.05;
    }

    /* jacket grid */
    .jacket-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 32px;
    }

    .jacket-card {
      display: block;
      cursor: pointer;
      text-decoration: none;
      color: var(--blue);
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .jacket-card:hover {
      transform: translateY(-4px);
      opacity: 0.85;
    }

    .jacket-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      margin-bottom: 16px;
      background: rgba(42,23,255,0.06);
    }

    .jacket-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .jacket-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.4;
      margin: 0 0 6px;
    }

    .jacket-book {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
      margin: 0 0 4px;
    }

    .jacket-author {
      font-size: 13px;
      opacity: 0.55;
      margin: 0 0 10px;
    }

    .jacket-song-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      opacity: 0.72;
    }

    .jacket-song-icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    .jacket-song-title { font-weight: 600; }
    .jacket-song-artist { opacity: 0.7; }

    @media (max-width: 900px) {
      :root { --sidebar-width: 72px; }
      .sidebar { width: var(--sidebar-width); padding: 22px 18px; }
      .nav { gap: 14px; font-size: 10px; }
      main { padding: 72px 28px 80px calc(var(--sidebar-width) + 28px); }
      .jacket-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; }
    }
  </style>
</head>
